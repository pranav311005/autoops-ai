<!DOCTYPE html>
<html>
<head>
    <title>AutoOps AI Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
        }

        h2 {
            margin-top: 30px;
            color: #34495e;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background-color: #3498db;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #219150;
        }
    </style>
</head>

<body>

    <h1>🚀 AutoOps AI Dashboard</h1>

    <div class="container">

        <!-- 📋 All Leads -->
        <h2>📋 All Leads</h2>
        {% for table in tables %}
            {{ table | safe }}
        {% endfor %}

        <!-- ✅ Safe Leads -->
        <h2>✅ Safe Leads</h2>
        {% for table in safe_tables %}
            {{ table | safe }}
        {% endfor %}

        <!-- 📊 Chart -->
        <h2>📊 AI Lead Analysis</h2>
        <img src="{{ url_for('static', filename='chart.png') }}" width="500">

        <!-- 📧 Send Email Button -->
        <form action="/send" method="post">
            <button class="btn" type="submit">📧 Send Emails</button>
        </form>

    </div>

</body>
</html>
