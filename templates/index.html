<!DOCTYPE html>
<html>
<head>
    <title>AutoOps AI Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: #333;
        }

        h1 {
            margin-top: 20px;
            color: white;
        }

        .container {
            background: white;
            margin: 30px auto;
            padding: 20px;
            width: 85%;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background: #4CAF50;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .chart {
            margin-top: 30px;
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: white;
        }
    </style>
</head>
<body>

<h1>🚀 AutoOps AI Dashboard</h1>

<div class="container">
    <h2>Leads Processing Results</h2>

    <!-- TABLE -->
    {% for table in tables %}
        {{ table|safe }}
    {% endfor %}

    <!-- CHART -->
    <div class="chart">
        <h2>📊 AI Lead Analysis</h2>
        <img src="{{ url_for('static', filename='chart.png') }}" width="500">
    </div>
</div>

<div class="footer">
    Developed for Hackathon 🚀
</div>

</body>
</html>
